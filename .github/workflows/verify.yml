name: Verify DTC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://pzvytksdpwnsnixcbrzr.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_a-iMxWAVN1OZDywsf-g99A_o8RgS_na
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Capture lint report
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint-report.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload lint report
        if: steps.lint.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.txt
          retention-days: 1
      - name: Enforce lint
        if: steps.lint.outputs.status != '0'
        run: exit 1
      - name: Production build
        run: npm run build
