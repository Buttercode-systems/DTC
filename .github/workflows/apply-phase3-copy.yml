name: Apply Phase 3 Evidence Copy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase3/public-evidence-validation
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/apply-phase3-evidence-copy.mjs
      - run: npm run verify
      - name: Commit verified Phase 3 copy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/assessment/AssessmentFlow.tsx components/AssessmentReport.tsx
          git commit -m "Clarify evidence boundaries in assessment and report"
          git push origin HEAD:phase3/public-evidence-validation
