name: Live TAD Operator and Client E2E

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  live-role-e2e:
    if: contains(github.event.pull_request.title, '[live-e2e]')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      E2E_APP_URL: http://127.0.0.1:4175
      E2E_PROXY_PORT: 4175
      E2E_PREVIEW_ORIGIN: https://due-today-git-feature-full-production-5884b8-ramatsies-projects.vercel.app
      E2E_SHARE_URL: https://due-today-git-feature-full-production-5884b8-ramatsies-projects.vercel.app/?_vercel_share=LjQ6Tyi6sJCzphCSuMuCAx7baiDi7tOr
      E2E_TAD_URL: https://the-admin-department.vercel.app
      NEXT_PUBLIC_SUPABASE_URL: https://pzvytksdpwnsnixcbrzr.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_a-iMxWAVN1OZDywsf-g99A_o8RgS_na
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start protected-preview proxy
        run: |
          node tests/vercel-preview-proxy.mjs > /tmp/tad-preview-proxy.log 2>&1 &
          echo $! > /tmp/tad-preview-proxy.pid
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:4175/__health >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/tad-preview-proxy.log
          exit 1
      - name: Prepare live journey
        run: node tests/prepare-live-role-e2e.mjs
      - name: Run live operator and client journey
        run: node tests/tad-live-role-e2e.mjs
      - if: failure()
        run: cat /tmp/tad-preview-proxy.log || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tad-live-role-e2e-${{ github.run_id }}
          path: test-results/tad-live-e2e
          if-no-files-found: warn
          retention-days: 14
