name: Temporary Production Operator E2E

on:
  push:
    branches: [fix/operator-bootstrap-and-e2e]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  operator-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node tests/temp-production-operator-e2e.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operator-e2e-diagnostics
          path: test-results/operator-e2e
