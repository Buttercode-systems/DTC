name: Debug Service Desk

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  capture-typecheck:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/service-desk-release
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Capture compiler output
        run: |
          npm run typecheck > typecheck-debug.log 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add typecheck-debug.log
          git commit -m "Capture Service Desk typecheck output"
          git push origin HEAD:feature/service-desk-release
