name: Debug Service Desk

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - run: npm run typecheck
