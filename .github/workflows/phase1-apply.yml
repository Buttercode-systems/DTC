name: Apply DTC Phase 1 blockers

on:
  push:
    branches: [fix/phase-1-production-blockers]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phase-1-production-blockers
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: node scripts/apply-phase1.mjs
      - run: npm ci
      - run: npm run verify
      - name: Commit patched production blockers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix DTC Phase 1 production blockers"
          git push origin HEAD:fix/phase-1-production-blockers
