name: Apply DTC Phase 1 blockers

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phase-1-production-blockers
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: node scripts/apply-phase1.mjs
      - run: npm ci
      - run: npm run verify
      - name: Upload verified Phase 1 files
        uses: actions/upload-artifact@v4
        with:
          name: dtc-phase1-verified
          retention-days: 1
          path: |
            lib/engine.ts
            app/app/actions.ts
            app/app/brief/page.tsx
            app/app/automation/page.tsx
            app/api/cron/owner-daily-briefs/route.ts
            components/NavLinks.tsx
            supabase/migrations/0010_complete_action_safely.sql
            vercel.json
            README.md
