name: Debug Workflow Typecheck

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture compiler diagnostics
        shell: bash
        run: |
          mkdir -p test-results
          set +e
          npm run typecheck > test-results/workflow-typecheck.log 2>&1
          status=$?
          cat test-results/workflow-typecheck.log
          exit $status
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-typecheck-diagnostics
          path: test-results/workflow-typecheck.log
          if-no-files-found: error
