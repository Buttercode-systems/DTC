name: TAD SaaS Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Capture typecheck
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          npm run typecheck 2>&1 | tee test-results/typecheck.log
      - name: Capture contract
        if: always()
        shell: bash
        run: |
          node tests/tad-dual-mode-contract.mjs 2>&1 | tee test-results/dual-mode-contract.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tad-saas-diagnostics-${{ github.run_id }}
          path: test-results/
          if-no-files-found: warn
